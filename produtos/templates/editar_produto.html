<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="{% url 'update_produto' produto.id %}" method="POST">
      {% csrf_token %}
      <input type="text" name="name" placeholder="nome" />
      <input type="text" name="price" placeholder="preço" />
      <input type="text" name="storage" placeholder="estoque" />
      <input type="text" name="category_id" placeholder="categoria" />
      <button type="submit">Editar</button>
    </form>

    {{produto.id}} - {{produto.name}} - {{produto.price}} - {{produto.storage}}
    - {{produto.category_id.name}}
  </body>
</html>
